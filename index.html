<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My King #exqt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  text-align:center;
}
.hidden{display:none;}
#loginBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:40px;
  border-radius:15px;
  box-shadow:0 0 30px rgba(0,191,255,0.5);
  width:300px;
}
input,textarea{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00bfff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
button:hover{background:#009acd;}
canvas{
  max-width:95%;
  margin-top:20px;
  border:2px solid #00bfff;
}
h1{
  margin-top:30px;
  color:#00bfff;
}
</style>
</head>
<body>

<div id="loginBox">
  <h2>My King #exqt</h2>
  <input type="password" id="accessCode" placeholder="Enter Access Code">
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<div id="app" class="hidden">

<h1>My King #exqt</h1>
<input type="file" id="imageUpload" accept="image/*"><br>
<canvas id="canvas"></canvas><br><br>
<input type="number" id="fontSize" value="92">
<input type="color" id="fontColor" value="#ffffff"><br>
<textarea id="usernames" rows="5" placeholder="Enter usernames (one per line)"></textarea><br>
<button onclick="generate()">Generate ZIP</button>

</div>

<script>
const VALID_CODE="KING2025";

if(localStorage.getItem("mk_auth")==="true"){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function login(){
  const code=document.getElementById("accessCode").value;
  if(code===VALID_CODE){
    localStorage.setItem("mk_auth","true");
    location.reload();
  }else{
    document.getElementById("error").innerText="Wrong Code";
  }
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let baseImage=new Image();
let textXPct=0.5, textYPct=0.5;
let previewX=0, previewY=0;

document.getElementById("imageUpload").addEventListener("change",function(e){
  const reader=new FileReader();
  reader.onload=function(event){
    baseImage.onload=function(){
      canvas.width=baseImage.width;
      canvas.height=baseImage.height;
      ctx.drawImage(baseImage,0,0);
    }
    baseImage.src=event.target.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

canvas.addEventListener("click",function(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  previewX = (e.clientX - rect.left) * scaleX;
  previewY = (e.clientY - rect.top) * scaleY;

  textXPct = previewX / canvas.width;
  textYPct = previewY / canvas.height;

  drawPreview();
});

function drawPreview(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(baseImage,0,0);

  ctx.strokeStyle="#00bfff";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(previewX,previewY,20,0,Math.PI*2);
  ctx.stroke();
}

async function generate(){
  if(!baseImage.src){alert("Upload image");return;}
  const fontSize=Number(document.getElementById("fontSize").value)||92;
  const fontColor=document.getElementById("fontColor").value;
  const usernames=document.getElementById("usernames").value
  .split("\n").map(u=>u.trim()).filter(Boolean);

  if(!usernames.length){alert("Enter usernames");return;}

  const zip=new JSZip();

  for(const username of usernames){
    const c=document.createElement("canvas");
    c.width=canvas.width;
    c.height=canvas.height;
    const cctx=c.getContext("2d");

    cctx.drawImage(baseImage,0,0);

    const x=c.width*textXPct;
    const y=c.height*textYPct;

    cctx.font=fontSize+"px Arial";
    cctx.fillStyle=fontColor;
    cctx.textAlign="center";
    cctx.textBaseline="middle";
    cctx.fillText("@"+username,x,y);

    cctx.font="bold 28px Arial";
    cctx.fillStyle="rgba(255,255,255,0.6)";
    cctx.textAlign="right";
    cctx.textBaseline="bottom";
    cctx.fillText("My King #exqt",c.width-15,c.height-15);

    const blob=await new Promise(res=>c.toBlob(res,"image/png"));
    zip.file(username+".png",blob);
  }

  const content=await zip.generateAsync({type:"blob"});
  const url=URL.createObjectURL(content);
  const a=document.createElement("a");
  a.href=url;
  a.download="MyKing.zip";
  a.click();
}
</script>

</body>
</html>
